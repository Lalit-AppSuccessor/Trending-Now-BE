<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Creator Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
      :root {
        --bg: #09090e;
        --bg2: #0f0f16;
        --bg3: #16161f;
        --bg4: #1c1c28;
        --bg5: #222230;
        --border: rgba(255, 255, 255, 0.06);
        --border2: rgba(255, 255, 255, 0.11);
        --border3: rgba(255, 255, 255, 0.18);
        --text: #ededf5;
        --text2: #9898b0;
        --text3: #52526a;
        --text4: #3a3a50;
        --accent: #7c6af7;
        --accent2: #a594ff;
        --accent-bg: rgba(124, 106, 247, 0.1);
        --accent-border: rgba(124, 106, 247, 0.25);
        --fb: #5b9cf6;
        --fb-bg: rgba(91, 156, 246, 0.08);
        --fb-border: rgba(91, 156, 246, 0.18);
        --ig: #f2698a;
        --ig-bg: rgba(242, 105, 138, 0.08);
        --ig-border: rgba(242, 105, 138, 0.2);
        --yt: #ff5555;
        --yt-bg: rgba(255, 85, 85, 0.08);
        --yt-border: rgba(255, 85, 85, 0.2);
        --news: #f0a830;
        --news-bg: rgba(240, 168, 48, 0.08);
        --news-border: rgba(240, 168, 48, 0.2);
        --green: #2dd4a0;
        --green-bg: rgba(45, 212, 160, 0.08);
        --r: 16px;
        --r-sm: 10px;
        --r-lg: 22px;
        --font-display: "Syne", sans-serif;
        --font-body: "DM Sans", sans-serif;
        --shadow-card:
          0 2px 16px rgba(0, 0, 0, 0.4), 0 1px 3px rgba(0, 0, 0, 0.3);
        --shadow-hover:
          0 8px 32px rgba(0, 0, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #05050b;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        padding: 20px 16px 40px;
        font-family: var(--font-body);
      }

      /* ── Phone shell ───────────────────────────────────────────── */
      .phone-wrap {
        width: 600px;
        max-width: 100%;
        background: var(--bg);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
        overflow: hidden;
      }

      /* ── Scroll body ───────────────────────────────────────────── */
      .scroll-body {
        overflow-y: auto;
        background: var(--bg);
      }
      .scroll-body::-webkit-scrollbar {
        display: none;
      }

      /* ── Hero ──────────────────────────────────────────────────── */
      .hero {
        padding: 22px 20px 18px;
        background: var(--bg);
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: -60px;
        left: -40px;
        width: 300px;
        height: 300px;
        background: radial-gradient(
          circle,
          rgba(124, 106, 247, 0.12) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .hero-top {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        position: relative;
      }
      .avatar {
        width: 72px;
        height: 72px;
        border-radius: 24px;
        background: linear-gradient(135deg, #7c6af7 0%, #f2698a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-size: 26px;
        font-weight: 800;
        color: #fff;
        flex-shrink: 0;
        box-shadow:
          0 0 0 1px rgba(124, 106, 247, 0.35),
          0 8px 24px rgba(124, 106, 247, 0.2);
        letter-spacing: -1px;
      }
      .hero-info {
        flex: 1;
        padding-top: 2px;
      }
      .hero-name {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.6px;
        line-height: 1.05;
      }
      .hero-handle {
        font-size: 12.5px;
        color: var(--text3);
        margin-top: 4px;
        font-weight: 400;
      }
      .hero-platforms {
        display: flex;
        gap: 5px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .plat-dot {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 10.5px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 4px;
        font-family: var(--font-display);
        letter-spacing: 0.2px;
      }
      .plat-dot.fb {
        background: var(--fb-bg);
        color: var(--fb);
        border: 1px solid var(--fb-border);
      }
      .plat-dot.ig {
        background: var(--ig-bg);
        color: var(--ig);
        border: 1px solid var(--ig-border);
      }
      .plat-dot.yt {
        background: var(--yt-bg);
        color: var(--yt);
        border: 1px solid var(--yt-border);
      }

      .hero-updated {
        text-align: right;
        padding-top: 2px;
      }
      .hero-updated .label {
        font-size: 10px;
        color: var(--text4);
      }
      .hero-updated .val {
        font-size: 12px;
        font-weight: 500;
        color: var(--text3);
        margin-top: 2px;
      }

      /* ── Stats grid ────────────────────────────────────────────── */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        padding: 0 20px 20px;
        margin-top: 4px;
      }
      .stat-card {
        background: var(--bg3);
        border-radius: var(--r);
        padding: 14px 14px 12px;
        border: 1px solid var(--border);
        position: relative;
        overflow: hidden;
        transition:
          border-color 0.2s,
          transform 0.2s;
      }
      .stat-card:hover {
        border-color: var(--border2);
        transform: translateY(-1px);
      }
      .stat-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 2px 2px 0 0;
        opacity: 0.8;
      }
      .stat-card.fb::after {
        background: linear-gradient(90deg, var(--fb), #7eb8ff);
      }
      .stat-card.ig::after {
        background: linear-gradient(90deg, #f2698a, #c77dff);
      }
      .stat-card.yt::after {
        background: linear-gradient(90deg, var(--yt), #ff9055);
      }
      .stat-card.sh::after {
        background: linear-gradient(90deg, var(--accent), #c07aff);
      }
      .stat-icon {
        width: 30px;
        height: 30px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        margin-bottom: 9px;
      }
      .stat-icon.fb {
        background: var(--fb-bg);
        color: var(--fb);
        border: 1px solid var(--fb-border);
      }
      .stat-icon.ig {
        background: var(--ig-bg);
        color: var(--ig);
        border: 1px solid var(--ig-border);
      }
      .stat-icon.yt {
        background: var(--yt-bg);
        color: var(--yt);
        border: 1px solid var(--yt-border);
      }
      .stat-icon.sh {
        background: var(--accent-bg);
        color: var(--accent2);
        border: 1px solid var(--accent-border);
      }
      .stat-val {
        font-family: var(--font-display);
        font-size: 28px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -1.5px;
        line-height: 1;
      }
      .stat-label {
        font-size: 11px;
        color: var(--text3);
        margin-top: 4px;
      }
      .stat-sub {
        font-size: 10px;
        color: var(--text4);
        margin-top: 3px;
      }

      /* ── Section divider / block ───────────────────────────────── */
      .section-divider {
        height: 8px;
        background: var(--bg2);
      }
      .section-block {
        background: var(--bg);
      }

      .section-head {
        padding: 18px 20px 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 13px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 700;
        font-family: var(--font-display);
        letter-spacing: 0.3px;
      }
      .section-badge.fb {
        background: var(--fb-bg);
        color: var(--fb);
        border: 1px solid var(--fb-border);
      }
      .section-badge.ig {
        background: var(--ig-bg);
        color: var(--ig);
        border: 1px solid var(--ig-border);
      }
      .section-badge.yt {
        background: var(--yt-bg);
        color: var(--yt);
        border: 1px solid var(--yt-border);
      }
      .section-badge.news {
        background: var(--news-bg);
        color: var(--news);
        border: 1px solid var(--news-border);
      }
      .section-badge.sh {
        background: var(--accent-bg);
        color: var(--accent2);
        border: 1px solid var(--accent-border);
      }
      .section-count {
        margin-left: auto;
        font-size: 11px;
        color: var(--text3);
      }

      /* ── Category filter ───────────────────────────────────────── */
      .category-cta {
        background: var(--bg);
        padding: 10px 20px 12px;
        display: flex;
        gap: 7px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        overflow-x: auto;
        scrollbar-width: none;
      }
      .category-cta::-webkit-scrollbar {
        display: none;
      }
      .cta-btn {
        border: 1px solid var(--border2);
        background: var(--bg3);
        color: var(--text2);
        padding: 7px 15px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        font-family: var(--font-display);
        letter-spacing: 0.2px;
        white-space: nowrap;
        transition: all 0.18s;
      }
      .cta-btn:hover {
        border-color: var(--border3);
        color: var(--text);
      }
      .cta-btn.active {
        background: var(--accent-bg);
        color: var(--accent2);
        border-color: var(--accent-border);
      }
      .cta-btn.news-active {
        background: var(--news-bg);
        color: var(--news);
        border-color: var(--news-border);
      }
      .cta-btn.fun-active {
        background: var(--green-bg);
        color: var(--green);
        border-color: rgba(45, 212, 160, 0.25);
      }

      /* ── NEWS CARDS ────────────────────────────────────────────── */
      .news-list {
        padding: 4px 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .news-card {
        background: var(--bg3);
        border-radius: var(--r);
        border: 1px solid var(--border);
        overflow: hidden;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          transform 0.2s;
        box-shadow: var(--shadow-card);
      }
      .news-card:hover {
        border-color: var(--border2);
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
      }
      .news-thumb-wrap {
        width: 100%;
        height: 250px;
        overflow: hidden;
        position: relative;
        background: var(--bg4);
      }
      .news-thumb-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        transition: transform 0.4s;
      }
      .news-card:hover .news-thumb-wrap img {
        transform: scale(1.03);
      }
      .news-thumb-wrap .news-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.55) 0%,
          transparent 50%
        );
      }
      .news-thumb-wrap .source-badge {
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.8);
        font-weight: 500;
      }
      .news-inner {
        padding: 14px 14px 13px;
      }
      .news-tags-row {
        display: flex;
        gap: 5px;
        margin-bottom: 9px;
        flex-wrap: wrap;
      }
      .breaking-tag {
        background: rgba(255, 85, 85, 0.12);
        color: var(--yt);
        border: 1px solid rgba(255, 85, 85, 0.22);
        font-size: 9.5px;
        font-weight: 800;
        padding: 3px 8px;
        border-radius: 20px;
        font-family: var(--font-display);
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }
      .news-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        line-height: 1.5;
        margin-bottom: 7px;
        font-family: var(--font-display);
        letter-spacing: -0.1px;
      }
      .news-desc {
        font-size: 12.5px;
        color: var(--text2);
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── FACEBOOK CARDS ────────────────────────────────────────── */
      .fb-list {
        display: flex;
        flex-direction: column;
        padding: 4px 20px 16px;
        gap: 10px;
      }

      .post-card {
        display: flex;
        gap: 12px;
        padding: 14px;
        border-radius: var(--r);
        background: var(--bg3);
        border: 1px solid var(--border);
        align-items: flex-start;
        cursor: pointer;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          transform 0.2s;
        text-decoration: none;
        box-shadow: var(--shadow-card);
        position: relative;
        overflow: hidden;
      }
      .post-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at top left,
          rgba(91, 156, 246, 0.04),
          transparent 60%
        );
        pointer-events: none;
      }
      .post-card:hover {
        border-color: var(--fb-border);
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
      }
      .post-thumb {
        width: 80px;
        min-width: 80px;
        height: 80px;
        border-radius: var(--r-sm);
        background: var(--bg4);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        position: relative;
        border: 1px solid var(--border);
      }
      .post-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .post-body {
        flex: 1;
        min-width: 0;
      }
      .post-platform-row {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 5px;
      }
      .post-acct {
        font-size: 11px;
        font-weight: 600;
        color: var(--fb);
        font-family: var(--font-display);
      }
      .post-date {
        font-size: 10.5px;
        color: var(--text4);
      }
      .post-text {
        font-size: 13px;
        color: var(--text);
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .eng-pills {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .ep {
        font-size: 11px;
        background: var(--bg5);
        border: 1px solid var(--border);
        padding: 3px 9px;
        border-radius: 20px;
        color: var(--text2);
        display: flex;
        align-items: center;
        gap: 3px;
      }

      /* ── INSTAGRAM GRID ────────────────────────────────────────── */
      .ig-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 19px;
        padding: 4px 20px 16px;
      }
      .ig-card {
        background: var(--bg3);
        border-radius: var(--r);
        overflow: hidden;
        border: 1px solid var(--border);
        cursor: pointer;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          transform 0.2s;
        box-shadow: var(--shadow-card);
      }
      .ig-card:hover {
        border-color: var(--ig-border);
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
      }
      .ig-thumb {
        width: 100%;
        aspect-ratio: 1;
        background: var(--bg4);
        overflow: hidden;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ig-thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.4s;
      }
      .ig-card:hover .ig-thumb img {
        transform: scale(1.05);
      }
      .ig-thumb video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        background: #000;
      }
      .ig-info {
        padding: 10px 11px 11px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ig-text {
        font-size: 12px;
        color: var(--text2);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }
      .ig-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .ig-likes {
        font-size: 11px;
        color: var(--ig);
        display: flex;
        align-items: center;
        gap: 4px;
        font-weight: 500;
      }
      .ig-acct {
        font-size: 10px;
        color: var(--text4);
        background: var(--bg5);
        padding: 2px 7px;
        border-radius: 6px;
        max-width: 90px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ig-time {
        font-size: 10px;
        color: var(--text4);
      }

      .hashtags-row {
        padding: 0 20px 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .htag {
        font-size: 11px;
        color: var(--accent2);
        background: var(--accent-bg);
        border: 1px solid var(--accent-border);
        padding: 3px 10px;
        border-radius: 20px;
        transition: background 0.15s;
      }
      .htag:hover {
        background: rgba(124, 106, 247, 0.18);
      }

      /* ── SHORTS GRID ───────────────────────────────────────────── */
      .shorts-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 19px;
        padding: 4px 20px 16px;
      }
      .short-card {
        background: var(--bg3);
        border-radius: var(--r);
        overflow: hidden;
        border: 1px solid var(--border);
        cursor: pointer;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.2s,
          box-shadow 0.2s,
          transform 0.2s;
        box-shadow: var(--shadow-card);
      }
      .short-card:hover {
        border-color: var(--accent-border);
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
      }
      .short-thumb {
        width: 100%;
        aspect-ratio: 9/14;
        background: var(--bg4);
        overflow: hidden;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--yt);
      }
      .short-thumb img,
      .short-thumb video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .short-thumb video {
        background: #000;
      }
      .short-info {
        padding: 10px 11px 12px;
      }
      .short-ch {
        font-size: 10px;
        font-weight: 700;
        color: var(--yt);
        font-family: var(--font-display);
        letter-spacing: 0.3px;
        margin-bottom: 4px;
        text-transform: uppercase;
      }
      .short-cap {
        font-size: 12px;
        color: var(--text2);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ── VIDEO OVERLAY ─────────────────────────────────────────── */
      .video-poster {
        width: 100%;
        height: 100%;
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .video-poster img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .video-poster .vgrad {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.45) 0%,
          transparent 60%
        );
      }
      .play-btn {
        position: relative;
        z-index: 2;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1.5px solid rgba(255, 255, 255, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        flex-shrink: 0;
      }
      .play-btn svg {
        width: 16px;
        height: 16px;
        fill: #fff;

      }
      .video-poster:hover .play-btn {

        transform: scale(1.08);
      }
      .post-thumb .play-btn {
        width: 32px;
        height: 32px;
      }
      .post-thumb .play-btn svg {
        width: 12px;
        height: 12px;
      }

      /* ── YOUTUBE LIST ──────────────────────────────────────────── */
      .yt-list-wrap {
        padding: 0;
      }
      .yt-card {
        display: flex;
        gap: 12px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        align-items: flex-start;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
      }
      .yt-card:hover {
        background: var(--bg2);
      }
      .yt-card:last-child {
        border-bottom: none;
      }
      .yt-thumb {
        width: 96px;
        min-width: 96px;
        height: 58px;
        border-radius: 10px;
        background: var(--bg4);
        overflow: hidden;
        position: relative;
        border: 1px solid var(--border);
        flex-shrink: 0;
      }
      .yt-thumb img,
      .yt-thumb video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .yt-thumb .play-btn {
        width: 28px;
        height: 28px;
      }
      .yt-thumb .play-btn svg {
        width: 10px;
        height: 10px;
      }
      .yt-body {
        flex: 1;
        min-width: 0;
      }
      .yt-text {
        font-size: 13px;
        color: var(--text);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 5px;
      }
      .yt-meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        align-items: center;
      }
      .ch-tag {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 20px;
        font-family: var(--font-display);
      }
      .ch-tag.sf {
        background: var(--yt-bg);
        color: var(--yt);
        border: 1px solid var(--yt-border);
      }
      .ch-tag.ev {
        background: var(--news-bg);
        color: var(--news);
        border: 1px solid var(--news-border);
      }
      .ch-tag.other {
        background: var(--accent-bg);
        color: var(--accent2);
        border: 1px solid var(--accent-border);
      }
      .yt-stat {
        font-size: 11px;
        color: var(--text3);
        display: flex;
        align-items: center;
        gap: 3px;
      }

      /* ── Filter row ────────────────────────────────────────────── */
      .filter-row {
        display: flex;
        gap: 6px;
        padding: 0 20px 12px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .filter-row::-webkit-scrollbar {
        display: none;
      }
      .filter-btn {
        padding: 5px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 500;
        border: 1px solid var(--border2);
        background: transparent;
        color: var(--text2);
        cursor: pointer;
        white-space: nowrap;
        font-family: var(--font-body);
        transition: all 0.15s;
      }
      .filter-btn.active {
        background: var(--yt-bg);
        border-color: var(--yt-border);
        color: var(--yt);
      }

      /* ── Footer ────────────────────────────────────────────────── */
      .footer-note {
        padding: 18px 20px 24px;
        text-align: center;
        font-size: 11px;
        color: var(--text4);
        line-height: 1.7;
        border-top: 1px solid var(--border);
        background: var(--bg);
      }

      /* ── Loader / Error ────────────────────────────────────────── */
      .loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 320px;
        gap: 14px;
        color: var(--text3);
        font-size: 13px;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-box {
        margin: 20px;
        padding: 18px;
        background: rgba(255, 85, 85, 0.07);
        border: 1px solid rgba(255, 85, 85, 0.18);
        border-radius: var(--r);
        font-size: 13px;
        color: var(--yt);
        line-height: 1.5;
      }
      .error-box .error-title {
        font-weight: 700;
        margin-bottom: 6px;
        font-family: var(--font-display);
      }

      /* ── Animations ────────────────────────────────────────────── */
      .fade-in {
        animation: fadeIn 0.38s ease forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .stagger-1 {
        animation-delay: 0.04s;
      }
      .stagger-2 {
        animation-delay: 0.08s;
      }
      .stagger-3 {
        animation-delay: 0.12s;
      }
      .yt-wrap {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
      }

      .yt-frame,
      .yt-frame iframe {
        width: 100%;
        height: 100%;
      }

      .custom-controls {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 10px;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
      }

      .controls-row {
        display: flex;
        gap: 8px;
      }

      .control-btn {
        border: 0;
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.15);
        color: #fff;
      }

      .progress-wrap {
        width: 100%;
        height: 4px;
        margin-bottom: 10px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-bar {
        width: 0;
        height: 100%;
        background: #fff;
        transition: width 0.2s linear;
      }
    </style>
  </head>
  <body>
    <div class="phone-wrap">
      <div class="scroll-body" id="scroll-body"></div>
    </div>

    <script>
      const API_URL = "https://clout-test-backend-1.onrender.com/api/creator/Samay_Raina/";

      window.addEventListener("DOMContentLoaded", async () => {
        showLoader();
        try {
          const response = await fetch(API_URL);
          const data = await response.json();
          renderProfile(data);
        } catch (error) {
          showError(error.message);
        }
      });

      function getTimestamp(p) {
        if (p.publishedAt) return Date.parse(p.publishedAt);
        if (p.scrapedAt) return Date.parse(p.scrapedAt);
        if (p.unixDate) return p.unixDate * 1000;
        return 0;
      }

      function byLatest(a, b) {
        return getTimestamp(b) - getTimestamp(a);
      }

      function escHtml(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function proxy(url) {
        if (!url) return "";
        return `https://clout-test-backend-1.onrender.com/proxy?url=${encodeURIComponent(url.replace(/&amp;/g, "&"))}`;
      }

      function parseCount(n) {
        if (!n) return 0;

        const value = String(n).toLowerCase().trim();

        if (value.endsWith("m")) {
          return parseFloat(value) * 1_000_000;
        }

        if (value.endsWith("k")) {
          return parseFloat(value) * 1_000;
        }

        return Number(value) || 0;
      }

      function fmtNum(n) {
        if (n === null || n === undefined) return "—";
        const num = Math.abs(parseCount(n));
        return Number(num).toLocaleString();
      }

      function fmtDate(iso) {
        if (!iso) return "";
        try {
          return new Date(iso).toLocaleDateString("en-IN", {
            day: "numeric",
            month: "short",
            year: "numeric",
          });
        } catch {
          return iso;
        }
      }

      function smartImage(url, cls = "") {
        if (!url) return "";
        const px = proxy(url);
        return `<img src="${px}" class="${cls}" alt="" loading="lazy"
                onerror="console.error('Image load failed:', this.src);

        if(!this.dataset.f){
          this.dataset.f='1';

          const original='${url.replace(/'/g, "\\'")}';

          console.log('Trying fallback:', original);

          this.src=original;
        }else{
          console.error('Fallback also failed:', this.src);

          this.remove();
        }"
              >`;
      }

      /* ── Inline video poster ────────────────────────────────────
               Clicking the play button plays the video in-place.
               We stop propagation so the parent <a> is NOT triggered.      */
      function videoPoster(videoUrl, thumbUrl) {
        const safeV = (videoUrl || "").replace(/'/g, "%27");
        return `
                <div class="video-poster" onclick="event.preventDefault();event.stopPropagation();playVideo(this,'${safeV}')">
                  ${thumbUrl ? smartImage(thumbUrl) : ""}
                  <div class="vgrad"></div>
                  <div class="play-btn">
                    <svg viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg>
                  </div>
                </div>`;
      }

      window.playVideo = function (el, url) {
        el.innerHTML = `
                <video controls autoplay playsinline preload="metadata"
                  style="width:100%;height:100%;object-fit:cover;background:#000;"
                  onclick="event.stopPropagation()">
                  <source src="${url}" type="video/mp4">
                </video>`;
      };

      function showLoader() {
        document.getElementById("scroll-body").innerHTML =
          '<div class="loader"><div class="spinner"></div><span>Loading creator profile…</span></div>';
      }

      function showError(msg) {
        document.getElementById("scroll-body").innerHTML =
          `<div class="error-box">
                   <div class="error-title">Failed to load</div>
                   ${escHtml(msg)}<br><br>
                   <button onclick="location.reload()" style="background:transparent;border:1px solid rgba(255,85,85,0.3);
                     color:var(--yt);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:12px;">
                     Retry
                   </button>
                 </div>`;
      }

      /* =========================
         YOUTUBE + MP4 PLAYER
      ========================= */

      window.ytPlayers = {};

      function getYoutubeId(url) {
        if (!url) return null;

        const patterns = [
          /youtube\.com\/watch\?v=([^&]+)/i,
          /youtube\.com\/shorts\/([^?&]+)/i,
          /youtube\.com\/embed\/([^?&]+)/i,
          /youtu\.be\/([^?&]+)/i,
        ];

        for (const pattern of patterns) {
          const match = url.match(pattern);
          if (match) return match[1];
        }

        return null;
      }

      function videoPoster(videoUrl, thumbUrl) {
        const safeV = encodeURIComponent(videoUrl || "");

        return `
          <div class="video-poster"
            onclick="event.preventDefault();event.stopPropagation();playVideo(this,decodeURIComponent('${safeV}'))">

            ${thumbUrl ? smartImage(thumbUrl) : ""}

            <div class="vgrad"></div>

            <div class="play-btn">
              <svg viewBox="0 0 16 16">
                <polygon points="4,2 14,8 4,14"></polygon>
              </svg>
            </div>

          </div>
        `;
      }

      window.playVideo = function (el, url) {
        const ytId = getYoutubeId(url);

        /* =========================
           YOUTUBE
        ========================= */
        if (ytId && window.YT) {
          const playerId =
            "yt_" + Date.now() + "_" + Math.random().toString(36).slice(2);

          el.innerHTML = `
            <div class="yt-wrap">

              <div id="${playerId}" class="yt-frame"></div>

              <div class="custom-controls">

                <div class="progress-wrap">
                  <div class="progress-bar"></div>
                </div>

                <div class="controls-row">

                  <button class="control-btn"
                    onclick="event.stopPropagation();toggleYoutubePlay('${playerId}')">
                    ▶
                  </button>

                  <button class="control-btn"
                    onclick="event.stopPropagation();toggleYoutubeMute('${playerId}')">
                    🔊
                  </button>

                  <button class="control-btn"
                    onclick="event.stopPropagation();youtubeFullscreen('${playerId}')">
                    ⛶
                  </button>

                </div>

              </div>

            </div>
          `;

          ytPlayers[playerId] = new YT.Player(playerId, {
            videoId: ytId,
            playerVars: {
              autoplay: 1,
              controls: 0,
              rel: 0,
              modestbranding: 1,
              playsinline: 1,
              fs: 0,
              iv_load_policy: 3,
            },
          });

          return;
        }

        /* =========================
           MP4 / DIRECT VIDEO
        ========================= */

        el.innerHTML = `
          <video
            controls
            autoplay
            playsinline
            preload="metadata"
            style="
              width:100%;
              height:100%;
              object-fit:cover;
              background:#000;
            "
            onclick="event.stopPropagation()">

            <source src="${url}">
          </video>
        `;
      };

      /* =========================
         CUSTOM YOUTUBE CONTROLS
      ========================= */

      window.toggleYoutubePlay = function (id) {
        const player = ytPlayers[id];
        if (!player) return;

        const state = player.getPlayerState();

        if (state === YT.PlayerState.PLAYING) {
          player.pauseVideo();
        } else {
          player.playVideo();
        }
      };

      window.toggleYoutubeMute = function (id) {
        const player = ytPlayers[id];
        if (!player) return;

        if (player.isMuted()) {
          player.unMute();
        } else {
          player.mute();
        }
      };

      window.youtubeFullscreen = function (id) {
        const wrapper = document.getElementById(id)?.closest(".yt-wrap");

        if (!wrapper) return;

        if (wrapper.requestFullscreen) {
          wrapper.requestFullscreen();
        } else if (wrapper.webkitRequestFullscreen) {
          wrapper.webkitRequestFullscreen();
        }
      };

      /* =========================
         PROGRESS BAR
      ========================= */

      setInterval(() => {
        Object.entries(ytPlayers).forEach(([id, player]) => {
          try {
            const duration = player.getDuration();
            const current = player.getCurrentTime();

            if (!duration) return;

            const wrap = document.getElementById(id)?.closest(".yt-wrap");

            const bar = wrap?.querySelector(".progress-bar");

            if (!bar) return;

            const percent = (current / duration) * 100;

            bar.style.width = percent + "%";
          } catch (err) {}
        });
      }, 500);

      /* ════════════════════════════════════════════════════════════
               RENDER
            ════════════════════════════════════════════════════════════ */
      function renderProfile(json) {
        const d = json.data;
        const news = [...(d.sections?.news || [])].sort(byLatest);

        const fbPosts = [...(d.sections?.facebook || [])].sort(byLatest);

        const igPosts = [...(d.sections?.instagram || [])].sort(byLatest);

        const shorts = [...(d.sections?.youtubeShorts || [])].sort(byLatest);

        const ytPosts = [...(d.sections?.youtube || [])]
          .filter((p) => p.text || p.account)
          .sort(byLatest);

        const stats = d.stats || {};
        const cat = d.categorized || {};
        const name = d.creatorName || "Creator";
        const initials = name
          .replace(/_/g, " ")
          .split(" ")
          .map((w) => w[0])
          .join("")
          .slice(0, 2)
          .toUpperCase();

        let html = "";

        /* ── Hero ─────────────────────────────────────────────── */
        html += `
                <div class="hero fade-in">
                  <div class="hero-top">
                    <div class="avatar">${escHtml(initials)}</div>
                    <div class="hero-info">
                      <div class="hero-name">${escHtml(name.replace(/_/g, " "))}</div>
                      <div class="hero-handle">@${escHtml(name)}</div>
                      <div class="hero-platforms">
                        ${
                          stats.facebook
                            ? `<span class="plat-dot fb">
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
                          </svg>Facebook</span>`
                            : ""
                        }
                        ${
                          stats.instagram
                            ? `<span class="plat-dot ig">
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5"/>
                            <circle cx="12" cy="12" r="4"/>
                            <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
                          </svg>Instagram</span>`
                            : ""
                        }
                        ${
                          stats.youtube || stats.youtubeShorts
                            ? `<span class="plat-dot yt">
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.54 6.42A2.78 2.78 0 0020.6 4.47C18.88 4 12 4 12 4s-6.88 0-8.6.47a2.78 2.78 0 00-1.94 1.95A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.4 19.53C5.12 20 12 20 12 20s6.88 0 8.6-.47a2.78 2.78 0 001.94-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"/>
                          </svg>YouTube</span>`
                            : ""
                        }
                      </div>
                    </div>
                    <div class="hero-updated">
                      <div class="label">Updated</div>
                      <div class="val">${fmtDate(d.updatedAt)}</div>
                    </div>
                  </div>
                </div>`;

        /* ── Category CTA ─────────────────────────────────────── */
        html += `
                <div class="category-cta fade-in stagger-1">
                  <button class="cta-btn active" onclick="showFeedCategory('all',this)">All Feed</button>
                  <button class="cta-btn" onclick="showFeedCategory('news',this)">
                    📰 News ${cat.news?.length ? `(${cat.news.length})` : ""}
                  </button>
                  <button class="cta-btn" onclick="showFeedCategory('fun',this)">
                    🎉 Lifestyle ${cat.fun?.length ? `(${cat.fun.length})` : ""}
                  </button>
                </div>`;

        /* ── NEWS ─────────────────────────────────────────────── */
        if (news.length) {
          html += `
                  <div class="section-divider"></div>
                  <div class="section-block fade-in stagger-2">
                    <div class="section-head">
                      <span class="section-badge news">📰 News</span>
                      <span class="section-count">${news.length} articles</span>
                    </div>
                    <div class="news-list">`;

          news.forEach((a) => {
            const img = a.urlToImage || a.image;
            html += `
                    <a href="${a.url || "#"}" target="_blank" rel="noopener"
                       class="news-card" data-category="${a.category || "news"}">
                      ${
                        img
                          ? `
                        <div class="news-thumb-wrap">
                          ${smartImage(img)}
                          <div class="news-overlay"></div>
                          <span class="source-badge">${escHtml(a.source?.name || a.source || "News")}</span>
                        </div>`
                          : ""
                      }
                      <div class="news-inner">
                        <div class="news-tags-row">
                          ${a.breaking ? `<span class="breaking-tag">Breaking</span>` : ""}
                        </div>
                        <div class="news-title">${escHtml(a.title || "")}</div>
                        ${a.description ? `<div class="news-desc">${escHtml(a.description)}</div>` : ""}
                      </div>
                    </a>`;
          });

          html += `</div></div>`;
        }

        /* ── FACEBOOK ─────────────────────────────────────────── */
        if (fbPosts.length) {
          html += `
                  <div class="section-divider"></div>
                  <div class="section-block fade-in">
                    <div class="section-head">
                      <span class="section-badge fb">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
                        </svg>Facebook
                      </span>
                      <span class="section-count">${stats.facebook?.totalPosts || ""} posts</span>
                    </div>
                    <div class="fb-list">`;

          fbPosts.forEach((p) => {
            const videoMedia = p.media?.find((m) => m.type === "video");
            const imageMedia = p.media?.find((m) => m.type === "image");
            const thumb = imageMedia?.url;
            const eng = p.engagement || {};

            /* Cards with videos must not be <a> tags at the top level
                     because we play video inside; instead we link via a button. */
            const hasVideo = !!videoMedia;

            html += hasVideo
              ? `<div class="post-card" data-category="${p.category || "other"}" style="cursor:default;">`
              : `<a href="${p.url || "#"}" target="_blank" rel="noopener" class="post-card" data-category="${p.category || "other"}">`;

            html += `
                    <div class="post-thumb">
                      ${
                        hasVideo
                          ? videoPoster(videoMedia.url, thumb)
                          : thumb
                            ? smartImage(thumb)
                            : `<svg width="22" height="22" viewBox="0 0 24 24" fill="var(--fb)" style="opacity:.4">
                               <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
                             </svg>`
                      }
                    </div>
                    <div class="post-body">
                      <div class="post-platform-row">
                        ${p.account ? `<span class="post-acct">${escHtml(p.account)}</span>` : ""}
                        ${p.publishedAt ? `<span class="post-date">· ${fmtDate(p.publishedAt)}</span>` : ""}
                        ${
                          hasVideo && p.url
                            ? `<a href="${p.url}" target="_blank" rel="noopener"
                            style="margin-left:auto;font-size:10px;color:var(--fb);opacity:.7;text-decoration:none;">
                            Open ↗</a>`
                            : ""
                        }
                      </div>
                      <div class="post-text">${escHtml(p.text || "")}</div>
                      <div class="eng-pills">
                        ${eng.reactions ? `<span class="ep">❤️ ${fmtNum(eng.reactions)}</span>` : ""}
                        ${eng.comments ? `<span class="ep">💬 ${fmtNum(eng.comments)}</span>` : ""}
                        ${eng.shares ? `<span class="ep">↗ ${fmtNum(eng.shares)}</span>` : ""}
                        ${p.videoViews ? `<span class="ep">👁 ${fmtNum(p.videoViews)}</span>` : ""}
                      </div>
                    </div>`;

            html += hasVideo ? `</div>` : `</a>`;
          });

          html += `</div></div>`;
        }

        /* ── INSTAGRAM ────────────────────────────────────────── */
        if (igPosts.length) {
          const allTags = [
            ...new Set(igPosts.flatMap((p) => p.hashtags || [])),
          ].slice(0, 10);

          html += `
                  <div class="section-divider"></div>
                  <div class="section-block fade-in">
                    <div class="section-head">
                      <span class="section-badge ig">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <rect x="2" y="2" width="20" height="20" rx="5"/>
                          <circle cx="12" cy="12" r="4"/>
                          <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
                        </svg>Instagram
                      </span>
                      <span class="section-count">
                        ${stats.instagram ? `${stats.instagram.accounts} acc · ${stats.instagram.totalPosts} posts` : ""}
                      </span>
                    </div>
                    <div class="ig-grid">`;

          igPosts.forEach((p) => {
            const thumb = p.thumbnail || p.media?.[0]?.url;
            const videoMedia = p.media?.find((m) => m.type === "video");
            const hasVideo = !!videoMedia;

            html += hasVideo
              ? `<div class="ig-card" data-category="${p.category || "other"}">`
              : `<a href="${p.url || "#"}" target="_blank" rel="noopener" class="ig-card" data-category="${p.category || "other"}">`;

            html += `
                    <div class="ig-thumb">
                      ${
                        hasVideo
                          ? videoPoster(videoMedia.url, thumb)
                          : smartImage(thumb)
                      }
                    </div>
                    <div class="ig-info">
                      <div class="ig-text" onclick="window.open('${p.url}','_blank')">${escHtml(p.text || p.caption || "")}</div>
                      <div class="ig-footer">
                        <div class="ig-likes">
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                          </svg>
                          ${fmtNum(p.likeCount)}
                        </div>
                        <div class="ig-acct">@${escHtml(p.account || "")}</div>
                      </div>
                      <div class="ig-time">${p.time || fmtDate(p.publishedAt) || ""}</div>
                    </div>`;

            html += hasVideo ? `</div>` : `</a>`;
          });

          html += `</div>`;
          if (allTags.length) {
            html += `<div class="hashtags-row">${allTags.map((t) => `<span class="htag">${escHtml(t)}</span>`).join("")}</div>`;
          }
          html += `</div>`;
        }

        /* ── SHORTS ───────────────────────────────────────────── */

        if (shorts.length) {
          html += `
                  <div class="section-divider"></div>
                  <div class="section-block fade-in">
                    <div class="section-head">
                      <span class="section-badge sh">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>Shorts
                      </span>
                      <span class="section-count">
                        ${stats.youtubeShorts ? `${stats.youtubeShorts.totalShorts} shorts · ${stats.youtubeShorts.channels} ch` : ""}
                      </span>
                    </div>
                    <div class="shorts-grid">`;

          shorts.forEach((s) => {
            const hasVideo = !!s.embedUrl;

            html += hasVideo
              ? `<div class="short-card" data-category="${s.category || "other"}">`
              : `<a href="${s.url || "#"}" target="_blank" rel="noopener" class="short-card" data-category="${s.category || "other"}">`;

            html += `
                    <div class="short-thumb">
                      ${
                        hasVideo
                          ? videoPoster(s.embedUrl, s.thumbnailUrl)
                          : smartImage(s.thumbnailUrl)
                      }
                    </div>
                    <div class="short-info" onclick="window.open('${s.url}','_blank')">
                      <div class="short-ch">${escHtml(s.account || "")}</div>
                      <div class="short-cap">${escHtml(s.caption || "")}</div>
                    </div>`;

            html += hasVideo ? `</div>` : `</a>`;
          });

          html += `</div></div>`;
        }

        /* ── YOUTUBE ──────────────────────────────────────────── */
        if (ytPosts.length) {
          const channels = [
            ...new Set(ytPosts.map((p) => p.account).filter(Boolean)),
          ];

          html += `
                  <div class="section-divider"></div>
                  <div class="section-block fade-in">
                    <div class="section-head">
                      <span class="section-badge yt">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M22.54 6.42A2.78 2.78 0 0020.6 4.47C18.88 4 12 4 12 4s-6.88 0-8.6.47a2.78 2.78 0 00-1.94 1.95A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.4 19.53C5.12 20 12 20 12 20s6.88 0 8.6-.47a2.78 2.78 0 001.94-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"/>
                          <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="var(--bg)"/>
                        </svg>YouTube
                      </span>
                      <span class="section-count">${stats.youtube?.totalPosts || ""} posts</span>
                    </div>
                    <div class="filter-row" id="yt-filters">
                      <button class="filter-btn active" onclick="filterYT('all',this)">All</button>
                      ${channels.map((ch) => `<button class="filter-btn" onclick="filterYT('${escHtml(ch)}',this)">${escHtml(ch)}</button>`).join("")}
                    </div>
                    <div class="yt-list-wrap" id="yt-list">`;

          ytPosts.forEach((p) => {
            const thumb = p.media?.[0]?.url;
            const videoMedia = p.media?.find((m) => m.type === "video");
            const hasVideo = !!videoMedia;
            const ch = (p.account || "").toLowerCase().includes("vlog")
              ? "ev"
              : p.account
                ? "sf"
                : "other";

            html += hasVideo
              ? `<div class="yt-card" data-category="${p.category || "other"}" data-ch="${escHtml(p.account || "")}">`
              : `<a href="${p.url || "#"}" target="_blank" rel="noopener" class="yt-card"
                          data-category="${p.category || "other"}" data-ch="${escHtml(p.account || "")}">`;

            html += `
                    <div class="yt-thumb">
                      ${
                        hasVideo
                          ? videoPoster(videoMedia.url, thumb)
                          : thumb
                            ? smartImage(thumb)
                            : `<svg width="20" height="20" viewBox="0 0 24 24" fill="var(--yt)" style="opacity:.4">
                               <path d="M22.54 6.42A2.78 2.78 0 0020.6 4.47C18.88 4 12 4 12 4s-6.88 0-8.6.47a2.78 2.78 0 00-1.94 1.95A29 29 0 001 12a29 29 0 00.46 5.58A2.78 2.78 0 003.4 19.53C5.12 20 12 20 12 20s6.88 0 8.6-.47a2.78 2.78 0 001.94-1.95A29 29 0 0023 12a29 29 0 00-.46-5.58z"/>
                             </svg>`
                      }
                    </div>
                    <div class="yt-body">
                      <div class="yt-text">${escHtml(p.text || "")}</div>
                      <div class="yt-meta">
                        ${p.account ? `<span class="ch-tag ${ch}">${escHtml(p.account)}</span>` : ""}
                        ${p.likes ? `<span class="yt-stat">👍 ${escHtml(p.likes)}</span>` : ""}
                        ${p.published ? `<span class="yt-stat">${escHtml(p.published)}</span>` : ""}
                      </div>
                    </div>`;

            html += hasVideo ? `</div>` : `</a>`;
          });

          html += `</div></div>`;
        }

        /* ── Footer ───────────────────────────────────────────── */
        html += `
                <div class="section-divider"></div>
                <div class="footer-note fade-in">
                  Created ${fmtDate(d.createdAt)} · Updated ${fmtDate(d.updatedAt)}<br>
                  Data sourced across Facebook, Instagram & YouTube
                </div>`;

        document.getElementById("scroll-body").innerHTML = html;
      }

      /* ── Filters ──────────────────────────────────────────────── */
      window.filterYT = function (ch, btn) {
        document
          .querySelectorAll("#yt-filters .filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        document
          .querySelectorAll("#yt-list .yt-card, #yt-list a.yt-card")
          .forEach((card) => {
            card.style.display =
              ch === "all" || card.dataset.ch === ch ? "" : "none";
          });
      };

      window.showFeedCategory = function (category, btn) {
        document.querySelectorAll(".cta-btn").forEach((b) => {
          b.classList.remove("active", "news-active", "fun-active");
        });
        if (category === "news") btn.classList.add("news-active");
        else if (category === "fun") btn.classList.add("fun-active");
        else btn.classList.add("active");

        document
          .querySelectorAll(
            ".post-card,.ig-card,.yt-card,.short-card,.news-card",
          )
          .forEach((el) => {
            const c = el.dataset.category || "other";
            el.style.display =
              category === "all" || c === category ? "" : "none";
          });
      };
    </script>
  </body>
</html>
